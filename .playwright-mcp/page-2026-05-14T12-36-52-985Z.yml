          - time [ref=e281]: 1941 – 1945
        - heading "Великая Отечественная война" [level=3] [ref=e282]
        - paragraph [ref=e283]: "Война СССР против нацистской Германии. Началась 22 июня 1941 года внезапным нападением. После катастроф 1941–42 — переломные победы: Москва (1941), Сталинград (1942–43), Курск (1943). В мае 1945 Красная армия взяла Берлин. Цена: ~27 млн погибших советских граждан. Центральное событие советской исторической памяти и ключевой элемент российской идентичности до сегодняшнего дня. Основа международного авторитета СССР."
      - article [ref=e284]:
        - generic [ref=e285]:
          - generic [ref=e286]: Событие
          - time [ref=e287]: 12 апреля 1961
        - heading "Полёт Юрия Гагарина" [level=3] [ref=e288]
        - paragraph [ref=e289]: Первый в истории человечества пилотируемый космический полёт. На корабле «Восток-1» Гагарин совершил виток вокруг Земли за 108 минут. Кульминация советской космической программы (Спутник-1 в 1957) и крупнейшая пропагандистская победа в Холодной войне. Одно из немногих событий XX века с однозначно позитивной оценкой в любых политических координатах.
      - article [ref=e290]:
        - generic [ref=e291]:
          - generic [ref=e292]: Явление
          - time [ref=e293]: 1985 – 1991
        - heading "Перестройка" [level=3] [ref=e294]
        - paragraph [ref=e295]: "Реформы М. С. Горбачёва: «ускорение», «гласность», «новое мышление». Цель — модернизировать социализм. Результат разошёлся с целями: гласность открыла обсуждение преступлений сталинизма; экономические реформы не помогли (дефицит, талоны); политическая либерализация привела к параду суверенитетов. Августовский путч ГКЧП и Беловежские соглашения — конец СССР. Пример того, как попытка реформ привела не к обновлению, а к крушению системы."
