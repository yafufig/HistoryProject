        - heading "«Шоковая терапия» и приватизация" [level=3] [ref=e344]
        - paragraph [ref=e345]: "Радикальные реформы Гайдара–Чубайса: либерализация цен (январь 1992), ваучерная приватизация (1992–94), залоговые аукционы (1995–96). Цель — переход к рыночной экономике. Результаты двойственны: частная собственность, рыночные институты — но гиперинфляция (~2500%), обесценивание сбережений, падение ВВП на 40% к 1998, дефолт, формирование «олигархов», рост бедности. «Лихие 90-е» — обоснование консервативного поворота 2000-х."
      - article [ref=e346]:
