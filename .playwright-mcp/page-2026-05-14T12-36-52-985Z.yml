        - heading "Российско-украинский конфликт" [level=3] [ref=e363]
        - paragraph [ref=e364]: "В феврале–марте 2014, после смены власти в Киеве в результате Евромайдана, Россия присоединила Крым. С весны 2014 — конфликт на востоке Украины. 24 февраля 2022 — «специальная военная операция»: полномасштабное вторжение. Заявленные цели Москвы — «демилитаризация», защита русскоязычных, предотвращение расширения НАТО. К 2026 РФ контролирует ~1/5 территории Украины, сотни тысяч жертв с обеих сторон. Май 2026 — переговоры при США, мира пока нет."
