        - paragraph [ref=e250]: От Октябрьской революции до распада СССР. 74 года, в течение которых на месте Российской империи существовало первое в мире социалистическое государство. Включает Гражданскую войну, сталинскую модернизацию, ВОВ, статус сверхдержавы, космические достижения и попытку реформ Горбачёва.
