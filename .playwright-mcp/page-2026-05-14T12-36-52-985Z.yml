  - generic [ref=e40]:
    - generic [ref=e41]:
      - img "Миниатюра из Лицевого летописного свода" [ref=e42]
      - generic [ref=e44]:
        - generic [ref=e45]: Период 1
        - heading "Древняя Русь" [level=2] [ref=e46]
        - img [ref=e48]
        - generic [ref=e51]: IX – XV вв. · 862 – 1480
        - paragraph [ref=e52]: От призвания варягов до Стояния на Угре. Складывается восточнославянская православная цивилизация, отличная от католического Запада и от исламского и тюркского мира степи.
    - generic [ref=e54]:
      - article [ref=e55]:
        - generic [ref=e56]:
          - generic [ref=e57]: Событие
          - time [ref=e58]: 862 год
        - heading "Призвание варягов" [level=3] [ref=e59]
        - paragraph [ref=e60]: По «Повести временных лет», в 862 году новгородские словене, кривичи и финно-угорские племена пригласили варяжского князя Рюрика с дружиной править ими. С Рюрика началась династия, правившая до конца XVI века. Историческая достоверность спорна — это легендарная дата, ставшая основой норманнской теории происхождения русской государственности. 862 год считается условной точкой отсчёта истории русского государства.
      - article [ref=e61]:
        - generic [ref=e62]:
          - generic [ref=e63]: Событие
          - time [ref=e64]: 988 год
        - heading "Крещение Руси" [level=3] [ref=e65]
        - paragraph [ref=e66]: Князь Владимир Святославич принял христианство византийского обряда и сделал его государственной религией. По летописи, выбору предшествовало «испытание вер». Массовое крещение в Днепре стало символом цивилизационного выбора в пользу Византии. Появилась славянская письменность, хроникальная традиция, каменная архитектура; Русь вошла в орбиту христианской Европы. Крещение определило восточнославянскую идентичность на тысячу лет.
      - article [ref=e67]:
        - generic [ref=e68]:
          - generic [ref=e69]: Личность
          - time [ref=e70]: 1019 – 1054
        - heading "Ярослав Мудрый и «Русская Правда»" [level=3] [ref=e71]
        - paragraph [ref=e72]: "Великий князь киевский, при котором Древнерусское государство достигло расцвета. Заключал династические браки с европейскими дворами — его дочери стали королевами Франции, Венгрии и Норвегии. Построил Софийский собор в Киеве. Главное наследие — «Русская Правда», первый письменный свод законов Руси: заменил кровную месть штрафами (вирами). Свидетельство перехода от родового общества к государственно-правовому."
      - article [ref=e73]:
        - generic [ref=e74]:
          - generic [ref=e75]: Явление
          - time [ref=e76]: XII – XIII вв.
        - heading "Феодальная раздробленность" [level=3] [ref=e77]
        - paragraph [ref=e78]: "После смерти Ярослава Русь распалась на удельные княжества. Любечский съезд 1097 года закрепил принцип «каждый держит отчину свою». К XII веку существовало более десятка независимых княжеств. Двойственное явление: развитие местных центров культуры, но ослабление обороноспособности, сделавшее Русь уязвимой перед монгольским нашествием. Типично средневековое явление, схожее с дроблением Каролингской империи."
      - article [ref=e79]:
        - generic [ref=e80]:
          - generic [ref=e81]: Явление
          - time [ref=e82]: 1237 – 1480
        - heading "Монголо-татарское иго" [level=3] [ref=e83]
        - paragraph [ref=e84]: "Система политической и даннической зависимости русских княжеств от Золотой Орды, установленная после нашествия Батыя 1237–1240 годов. Князья получали «ярлык» от хана, платили «выход», участвовали в ордынских походах. Длилось около 240 лет. Оценки разнятся: одни видят в иге причину отставания от Европы; другие подчёркивают элементы культурного синтеза. В любом случае — ключевой фактор пути развития Руси."
      - article [ref=e85]:
        - generic [ref=e86]:
          - generic [ref=e87]: Идея
          - time [ref=e88]: с 988 г.
        - heading "Православная цивилизационная идентичность" [level=3] [ref=e89]
        - paragraph [ref=e90]: С крещения 988 года православие стало для Руси не просто религией, но цивилизационным выбором — в пользу Византии и против латинского Запада. Принцип «симфонии властей» определял отношения князей и церкви. После падения Константинополя эта идея трансформировалась в концепцию «Третьего Рима». Православие сформировало этику, искусство, календарь и язык русской культуры до сегодняшнего дня.
  - img [ref=e93]
  - generic [ref=e98]:
    - generic [ref=e99]:
      - 'img "Аполлинарий Васнецов: старая Москва" [ref=e100]'
      - generic [ref=e102]:
        - generic [ref=e103]: Период 2
        - heading "Московское государство" [level=2] [ref=e104]
        - img [ref=e106]
        - generic [ref=e110]: 1480 – 1721
        - paragraph [ref=e111]: "От свержения ордынского ига до провозглашения империи. Москва превращается в столицу единого централизованного государства, а затем — в царство. Складываются ключевые черты будущей государственности: самодержавие, идеология «Третьего Рима», крепостное право."
    - generic [ref=e113]:
      - article [ref=e114]:
        - generic [ref=e115]:
          - generic [ref=e116]: Личность
          - time [ref=e117]: 1462 – 1505
        - heading "Иван III Великий" [level=3] [ref=e118]
        - paragraph [ref=e119]: Великий князь, при котором завершилось объединение русских земель вокруг Москвы (Новгород 1478, Тверь 1485) и было свергнуто ордынское иго (1480). Принял титул «государя всея Руси», женился на Софье Палеолог, перенеся в Москву византийскую символику (двуглавый орёл). Построил Московский Кремль, принял Судебник 1497 года. Многие историки именно его, а не Петра I, считают истинным «собирателем» русских земель.
      - article [ref=e120]:
        - generic [ref=e121]:
          - generic [ref=e122]: Событие
          - time [ref=e123]: осень 1480
        - heading "Стояние на Угре" [level=3] [ref=e124]
        - paragraph [ref=e125]: Войска Ивана III и хана Ахмата несколько недель стояли друг против друга на реке Угре. Ахмат не решился перейти реку под огнём русской артиллерии, ждал помощи польского короля Казимира IV, которая не пришла, и в ноябре отступил. Битвы не было, но «стояние» завершило 240-летнюю зависимость от Орды. 1480 год — отправная точка существования полностью независимого Московского государства.
      - article [ref=e126]:
        - generic [ref=e127]:
          - generic [ref=e128]: Идея
          - time [ref=e129]: ок. 1510-х
        - heading "«Москва — Третий Рим»" [level=3] [ref=e130]
        - paragraph [ref=e131]: "Концепцию сформулировал псковский старец Филофей в посланиях Василию III: «Два Рима пали, третий стоит, а четвёртому не быть». После падения Рима (476) и Константинополя (1453) Москва — последний хранитель православия. Концепция дала идеологическое обоснование принятия Иваном IV царского титула (1547) и учреждения Московского патриархата (1589). Шаблон мессианского самовосприятия прослеживается до сегодняшнего дня."
      - article [ref=e132]:
        - figure [ref=e133]:
          - generic: 1 / 2
          - generic [ref=e134]:
            - button "Слайд 1" [ref=e135] [cursor=pointer]
            - button "Слайд 2" [ref=e136] [cursor=pointer]
        - generic [ref=e137]:
          - generic [ref=e138]: Явление
          - time [ref=e139]: 1565 – 1572
        - heading "Опричнина Ивана Грозного" [level=3] [ref=e140]
        - paragraph [ref=e141]: "Система управления Ивана IV, разделившая страну на «опричнину» (личный удел царя с особым войском) и «земщину». Опричное войско носило чёрную форму, к сёдлам прикрепляли собачьи головы и мётлы — символы «выгрызания и выметания» измены. Цель — борьба с боярской «изменой». Результат: массовые казни, разорение Новгорода (1570), экономический упадок. Первый прецедент массового государственного террора против собственного населения."
      - article [ref=e142]:
        - generic [ref=e143]:
          - generic [ref=e144]: Событие
          - time [ref=e145]: 1598 – 1613
        - heading "Смутное время" [level=3] [ref=e146]
        - paragraph [ref=e147]: Системный кризис после пресечения династии Рюриковичей. Включал династический кризис, гражданскую войну, голод 1601–1603 годов, самозванцев (Лжедмитрии I и II), польскую и шведскую интервенцию, оккупацию Москвы поляками (1610–1612). Освобождение Москвы Вторым ополчением Минина и Пожарского (октябрь 1612) и избрание Земским собором Михаила Романова (1613) положили начало 300-летней династии Романовых.
      - article [ref=e148]:
        - generic [ref=e149]:
          - generic [ref=e150]: Явление
          - time [ref=e151]: кон. XV в. – 1649
        - heading "Закрепощение крестьян" [level=3] [ref=e152]
        - paragraph [ref=e153]: Юридическое закрепление крестьян за землёй, развивавшееся с конца XV века (Судебник 1497 — ограничение Юрьевым днём) и завершившееся Соборным уложением 1649 года при Алексее Михайловиче. Уложение установило бессрочный сыск беглых — фактическое утверждение крепостного права. Цель — обеспечить служилое дворянство рабочей силой. Источник социальной отсталости, восстаний (Разин, Пугачёв) и революционных настроений.
  - img [ref=e156]
  - generic [ref=e161]:
    - generic [ref=e162]:
      - img "Зимний дворец, Санкт-Петербург" [ref=e163]
      - generic [ref=e165]:
        - generic [ref=e166]: Период 3
        - heading "Российская империя" [level=2] [ref=e167]
        - img [ref=e169]
        - generic [ref=e174]: 1721 – 1917
        - paragraph [ref=e175]: "От провозглашения империи Петром I до Февральской революции. Россия становится одной из великих европейских держав. Внутри страны — мучительный поиск пути модернизации: реформы Петра, просвещённый абсолютизм, Великие реформы Александра II, спор о цивилизационном выборе."
        - img "Карта Российской империи по губерниям и областям, 1914 г." [ref=e176]
    - generic [ref=e178]:
      - article [ref=e179]:
        - generic [ref=e180]:
          - generic [ref=e181]: Личность
          - time [ref=e182]: 1689 – 1725
        - heading "Пётр I и его реформы" [level=3] [ref=e183]
        - paragraph [ref=e184]: Первый император Всероссийский. Цель — модернизация России по западному образцу. Реформировал армию, создал флот, ввёл подушную подать, Табель о рангах, Сенат, коллегии. Основал Санкт-Петербург (1703). Цена реформ — массовая мобилизация, гибель десятков тысяч на стройке Петербурга, восстания, культурный раскол на «европейскую» элиту и «русское» крестьянство. Получил империю европейского уровня ценой колоссального напряжения нации.
      - article [ref=e185]:
        - generic [ref=e186]:
          - generic [ref=e187]: Событие
          - time [ref=e188]: 27 июня 1709
        - heading "Полтавская битва" [level=3] [ref=e189]
        - paragraph [ref=e190]: Решающее сражение Северной войны между Россией и Швецией. Армия Карла XII, считавшаяся непобедимой и разгромившая Россию под Нарвой (1700), была разгромлена под Полтавой. Швеция утратила статус великой державы, Россия стала ведущей силой на Балтике. Ништадтский мир (1721) закрепил за Россией Прибалтику, Пётр I принял титул «Императора Всероссийского». Один из главных военных триумфов русской истории.
      - article [ref=e191]:
        - generic [ref=e192]:
          - generic [ref=e193]: Идея
          - time [ref=e194]: 1762 – 1796
        - heading "Просвещённый абсолютизм Екатерины II" [level=3] [ref=e195]
        - paragraph [ref=e196]: Сочетание идей Просвещения с сохранением абсолютной власти. Екатерина переписывалась с Вольтером и Дидро, написала «Наказ» с цитатами из Монтескьё, провела губернскую реформу и секуляризацию. На словах — идеалы законности; на деле — расширение крепостного права, разделы Польши, подавление Пугачёва. Противоречие между декларируемыми идеалами и реальностью модернизации «сверху» в крепостной стране.
      - article [ref=e197]:
        - generic [ref=e198]:
          - generic [ref=e199]: Событие
          - time [ref=e200]: "1812"
        - heading "Отечественная война 1812" [level=3] [ref=e201]
        - paragraph [ref=e202]: «Великая армия» Наполеона (более 600 000 человек) вторглась в Россию. Армия Кутузова отступала, заманивая противника вглубь. Бородинское сражение (26 августа) не дало решающего результата. После оставления Москвы и её пожара армия Наполеона была уничтожена холодом, голодом и партизанами. Война стала народной и моментом небывалого национального подъёма, вдохновила декабристов и роман «Война и мир». Россия стала «жандармом Европы».
      - article [ref=e203]:
        - generic [ref=e204]:
          - generic [ref=e205]: Событие
          - time [ref=e206]: 19 февраля 1861
        - heading "Отмена крепостного права" [level=3] [ref=e207]
        - paragraph [ref=e208]: "Манифест Александра II освободил около 23 млн помещичьих крестьян от личной зависимости. Последовал за поражением в Крымской войне, показавшим отсталость крепостной России. Реформа половинчатая: личная свобода, но землю надо выкупать (платежи отменили только в 1907). Открыла дорогу остальным «Великим реформам». Неполнота реформы породила «аграрный вопрос», ставший причиной революций 1905 и 1917 годов."
      - article [ref=e209]:
        - generic [ref=e210]:
          - generic [ref=e211]: Явление
          - time [ref=e212]: 1830-е – 1840-е
        - heading "Западники и славянофилы" [level=3] [ref=e213]
        - paragraph [ref=e214]: Два направления русской общественной мысли. Западники (Грановский, Кавелин, Белинский) — Россия часть Европы, путь её — догоняющая модернизация по западному образцу. Славянофилы (Хомяков, Киреевский, Аксаковы) — у России собственный путь, опирающийся на православие, общину и «соборность». Это вечный спор о цивилизационном выборе, но настоящий накал он получил позже — после проигранной Крымской войны, реформ и революционных потрясений начала XX века.
      - article [ref=e215]:
        - generic [ref=e216]:
          - generic [ref=e217]: Событие
          - time [ref=e218]: 1853 – 1856
        - heading "Крымская война" [level=3] [ref=e219]
        - paragraph [ref=e220]: "Война России против коалиции Великобритании, Франции, Османской империи и Сардинии. Поводом послужил спор о святых местах в Палестине, реальной причиной — обострение Восточного вопроса и страх европейских держав перед усилением России на Балканах. Ключевые события — оборона Севастополя (1854–1855), гибель адмиралов Нахимова и Корнилова, унизительный Парижский мир (1856) с запретом держать флот на Чёрном море. Поражение обнажило технологическое отставание николаевской России: парусный флот против пароходов, гладкоствольные ружья против нарезных. Шок от проигрыша запустил «Великие реформы» Александра II — отмену крепостного права, судебную, земскую, военную реформы. Стал ключевым аргументом «западников» и одновременно стимулом для нового витка дискуссии о русском пути."
      - article [ref=e221]:
        - generic [ref=e222]:
          - generic [ref=e223]: Событие
          - time [ref=e224]: 1904 – 1907
        - heading "Русско-японская война и революция 1905 года" [level=3] [ref=e225]
        - paragraph [ref=e226]: "«Маленькая победоносная война», задуманная как способ отвлечь общество от внутренних проблем, обернулась катастрофой: падение Порт-Артура (1904), разгром при Цусиме (1905), Портсмутский мир с потерей Южного Сахалина. На фоне военных поражений и расстрела мирного шествия 9 января («Кровавое воскресенье») страну охватили массовые забастовки, крестьянские бунты, восстание на броненосце «Потёмкин», декабрьское восстание в Москве. Манифест 17 октября 1905 года даровал гражданские свободы и учреждал Государственную думу — впервые в истории России появился парламент. Революция показала глубину социальных противоречий: революционные кружки, наследники народников и западников, вырвались в массовую политику. Фактически — генеральная репетиция 1917 года."
      - article [ref=e227]:
        - generic [ref=e228]:
          - generic [ref=e229]: Событие
          - time [ref=e230]: 1914 – 1918
        - heading "Первая мировая война" [level=3] [ref=e231]
        - paragraph [ref=e232]: "В августе 1914 Россия вступила в войну на стороне Антанты против Германии и Австро-Венгрии — формально ради защиты православной Сербии. Восточный фронт растянулся от Балтики до Чёрного моря. Брусиловский прорыв (1916) стал единственным крупным успехом; в целом война шла тяжело: миллионные потери, кризис снабжения, «министерская чехарда», скандалы вокруг Распутина. Война подорвала экономику и окончательно дискредитировала монархию в глазах элиты и города. В феврале 1917 года петроградские очереди за хлебом переросли в революцию, в течение недели Николай II отрёкся от престола — закончилось 300-летнее правление Романовых. Война, начатая под лозунгами славянского братства, обернулась крушением империи и стала непосредственным прологом Октябрьской революции."
