        - paragraph [ref=e316]: Период существования Российской Федерации как независимого государства. Болезненный переход от плановой экономики к рыночной, формирование новых институтов, две чеченские войны, экономический рост 2000-х, конфликт с Западом и постсоветскими соседями. Изложение придерживается принципа «декларируемые цели → реализация → последствия».
