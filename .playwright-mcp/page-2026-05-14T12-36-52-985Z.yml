        - heading "Октябрьская революция" [level=3] [ref=e258]
        - paragraph [ref=e259]: Вооружённое восстание большевиков в Петрограде, свергнувшее Временное правительство. Спланировано Военно-революционным комитетом во главе с Троцким, идейно — Лениным. Штурм Зимнего, передача власти II съезду Советов. Декреты о мире и о земле. Цель — построение социализма; результат — первое в мире социалистическое государство, 5-летняя гражданская война (1918–1922) и эмиграция миллионов. Переломный момент XX века.
      - article [ref=e260]:
        - generic [ref=e261]:
          - generic [ref=e262]: Личность
          - time [ref=e263]: 1870 – 1924
        - heading "В. И. Ленин" [level=3] [ref=e264]
        - paragraph [ref=e265]: "Создатель партии большевиков, идеолог и организатор Октябрьской революции, основатель Советского государства. Разработал концепцию партии «нового типа». После 1917 — глава Совнаркома: «военный коммунизм» (1918–1921), затем НЭП (1921). Подписал Брестский мир, утвердил создание СССР (1922). Хотел общество без эксплуатации; получил государство, ставшее тоталитарным при Сталине. Глобальное влияние на XX век."
      - article [ref=e266]:
        - generic [ref=e267]:
          - generic [ref=e268]: Идея
          - time [ref=e269]: 1917 – 1991
        - heading "Марксизм-ленинизм как государственная идеология" [level=3] [ref=e270]
        - paragraph [ref=e271]: "Официальная идеология СССР: соединение марксистской теории классовой борьбы с ленинской концепцией пролетарской революции и партии-авангарда. Закреплена в Программе ВКП(б)/КПСС и советских конституциях, обязательно преподавалась во всех вузах в курсах истмата, диамата и научного коммунизма. Декларировала построение бесклассового коммунистического общества. На практике обосновывала монополию КПСС, плановую экономику и подавление инакомыслия как «буржуазной идеологии». Идея «реального социализма» и неизбежной победы над капитализмом определяла внутреннюю и внешнюю политику СССР на протяжении 74 лет, особенно в эпоху Холодной войны."
      - article [ref=e272]:
        - generic [ref=e273]:
          - generic [ref=e274]: Явление
          - time [ref=e275]: 1928 – 1953
        - heading "Сталинизм" [level=3] [ref=e276]
        - paragraph [ref=e277]: "Тоталитарная система и форсированная модернизация. Индустриализация (пятилетки) — тысячи заводов, металлургия. Коллективизация (1929–33) — насильственное объединение крестьян в колхозы — привела к голоду 1932–33 годов с миллионами жертв. «Большой террор» 1937–38: ~700 тыс. расстреляны, миллионы — через ГУЛАГ. Цель — «социализм в одной стране»; результат — победа в ВОВ, сверхдержава, но колоссальные жертвы."
      - article [ref=e278]:
