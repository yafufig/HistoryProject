        - heading "Борис Ельцин" [level=3] [ref=e333]
        - paragraph [ref=e334]: Первый президент РФ. Бывший член Политбюро, опала при Горбачёве сделала его символом оппозиции «номенклатуре». В августе 1991 выступил против ГКЧП, в декабре устроил Беловежский путч, оформивший роспуск СССР. Возглавил радикальные реформы 1992 года. В октябре 1993 разрешил политический кризис расстрелом Верховного Совета. Начал Первую чеченскую войну (1994–96). В декабре 1999 досрочно ушёл в отставку, передав власть Путину.
