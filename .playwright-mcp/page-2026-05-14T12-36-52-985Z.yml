        - heading "Распад СССР" [level=3] [ref=e323]
        - paragraph [ref=e324]: 8 декабря 1991 лидеры России (Ельцин), Украины (Кравчук) и Беларуси (Шушкевич) подписали в Беловежской Пуще соглашение о роспуске СССР. 25 декабря Горбачёв ушёл в отставку, над Кремлём спущен советский флаг. На месте СССР возникло 15 независимых государств. Распад без масштабной войны, но повлёк миллионы перемещённых лиц, серию региональных конфликтов и глубокую экономическую депрессию 1990-х.
