          - generic [ref=e348]: Личность
          - time [ref=e349]: 1999 – наст. время
        - heading "Владимир Путин" [level=3] [ref=e350]
        - paragraph [ref=e351]: "Второй и четвёртый президент РФ. Бывший офицер КГБ, директор ФСБ. Пришёл к власти на фоне Второй чеченской войны и роста цен на нефть. Первый период (2000-е): «стабилизация», ослабление олигархов, рост доходов. Второй период (с 2012): консервативный поворот, конфликт с Западом, Крым (2014), Сирия, СВО в Украине с 2022. Конституционные поправки 2020 обнулили его сроки. Определяющая фигура российской политики последней четверти века."
      - article [ref=e352]:
        - generic [ref=e353]:
          - generic [ref=e354]: Идея
          - time [ref=e355]: 2000-е
        - heading "«Суверенная демократия» и «русский мир»" [level=3] [ref=e356]
        - paragraph [ref=e357]: "Концепция «суверенной демократии», сформулированная в 2006 году Владиславом Сурковым, была попыткой отделить «российскую» демократию от западной: суверенитет важнее заимствованных извне процедур. Идея была реакцией на «цветные революции» 2003–2005, но не прижилась — Суркова со временем отстранили, а его конструкция конкурировала с другой идеологией, «русским миром» (Стрелков, Малофеев, Дугин, Прилепин). В итоге верх взял именно «русский мир», но не в виде, в котором его представляли идеологи движения, а в гротескном — поскольку у руля остались дельцы 90-х. Результат — внешнеполитическая риторика «многополярного мира» при практической логике хозяйствующих субъектов."
